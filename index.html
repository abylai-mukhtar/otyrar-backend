<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Админ — Отырар Музей</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--gold:#C9973A;--dark:#1A1208;--brown:#3D2B1F;--sand:#F5EDD8;--bg:#FDFAF4}
    body{font-family:'Noto Sans',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-wrap{background:var(--bg);border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
    .login-logo{text-align:center;margin-bottom:32px}
    .login-logo h1{font-family:'Playfair Display',serif;color:var(--dark);font-size:24px;line-height:1.3}
    .login-logo p{color:var(--gold);font-size:13px;margin-top:6px;letter-spacing:.5px}
    .login-logo .icon{font-size:48px;margin-bottom:12px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-weight:600;color:var(--brown);margin-bottom:8px;font-size:14px}
    .form-group input{width:100%;padding:12px 16px;border:2px solid #ddd;border-radius:8px;font-size:15px;transition:border-color .2s;font-family:inherit}
    .form-group input:focus{outline:none;border-color:var(--gold)}
    .btn-login{width:100%;padding:14px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:8px}
    .btn-login:hover{background:#b5832f}
    #login-error{color:#c0392b;font-size:14px;text-align:center;margin-top:12px;min-height:20px}
    .back-link{text-align:center;margin-top:20px}
    .back-link a{color:var(--gold);text-decoration:none;font-size:14px}
    .back-link a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="icon">🏛️</div>
      <h1>Отырар Музей</h1>
      <p>ӘКІМШІ ПАНЕЛІ · ПАНЕЛЬ АДМИНИСТРАТОРА</p>
    </div>
    <div class="form-group">
      <label for="admin-user">Логин</label>
      <input type="text" id="admin-user" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="admin-pass">Пароль</label>
      <input type="password" id="admin-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="adminLogin()">Кіру · Войти · Login</button>
    <div id="login-error"></div>
    <div class="back-link"><a href="../kk/index.html">← Сайтқа оралу</a></div>
  </div>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/cms-sync.js"></script>
  <script>
    // If already logged in, go to dashboard
    if (localStorage.getItem('otyrar_token')) window.location.href = 'dashboard.html';
    document.getElementById('admin-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') adminLogin();
    });
  </script>
</body>
</html>
